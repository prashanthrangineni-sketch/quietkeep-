<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5c4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0d0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book body -->
  <rect x="28" y="55" width="130" height="120" rx="14" ry="14" fill="url(#bookGrad)" />

  <!-- Book spine (dark left edge) -->
  <rect x="28" y="55" width="18" height="120" rx="9" ry="4" fill="#0d5c4a" opacity="0.6" />

  <!-- Inner page lines (subtle) -->
  <rect x="60" y="105" width="80" height="5" rx="2" fill="rgba(255,255,255,0.2)" />
  <rect x="60" y="118" width="65" height="5" rx="2" fill="rgba(255,255,255,0.2)" />
  <rect x="60" y="131" width="72" height="5" rx="2" fill="rgba(255,255,255,0.2)" />

  <!-- Top bookmark (cream/ivory) -->
  <rect x="75" y="42" width="34" height="72" rx="3" ry="3" fill="url(#pageGrad)" />
  <!-- Bookmark V notch -->
  <polygon points="75,114 92,100 109,114" fill="url(#bookGrad)" />

  <!-- Bottom bookmark tab (small, dark) -->
  <rect x="75" y="166" width="20" height="22" rx="3" ry="3" fill="#0d5c4a" />
  <!-- Bottom bookmark V -->
  <polygon points="75,188 85,180 95,188" fill="#1a7a5e" />

  <!-- QK text -->
  <text x="138" y="88"
    font-family="-apple-system, 'Helvetica Neue', sans-serif"
    font-size="40"
    font-weight="800"
    fill="#0d3d30"
    text-anchor="start"
    letter-spacing="-1">QK</text>
</svg>
