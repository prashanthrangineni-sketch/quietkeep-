name: Build QuietKeep Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Which APK to build?'
        required: true
        default: 'personal'
        type: choice
        options:
          - personal
          - business

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install project dependencies
        run: |
          echo "=== Node: $(node --version) | npm: $(npm --version) ==="
          npm install --legacy-peer-deps
          echo "=== npm install complete ==="

      - name: Install Capacitor (pinned to 6.x)
        run: |
          npm install --save-exact --legacy-peer-deps \
            @capacitor/core@6.2.0 \
            @capacitor/cli@6.2.0 \
            @capacitor/android@6.2.0 \
            @capacitor/camera@6.0.2 \
            @capacitor/geolocation@6.0.1 \
            @capacitor/push-notifications@6.0.2 \
            @capacitor/splash-screen@6.0.2 \
            @capacitor/status-bar@6.0.1 \
            @capacitor/keyboard@6.0.2
          echo "=== Capacitor install complete ==="
          npx cap --version

      # ─────────────────────────────────────────────────────────────────────
      # STATIC EXPORT BUILD FOR CAPACITOR APK
      #
      # The output bundle (out/) is synced into the APK assets via `cap sync`.
      # server.url = "https://quietkeep.com" is set in capacitor.config.json,
      # so the WebView loads all pages from Vercel — not from the local bundle.
      # This is INTENTIONAL: it eliminates the fetch interceptor cold-start race
      # that broke voice in builds without server.url. Voice, STT, and all API
      # routes work correctly because fetch("/api/...") resolves against Vercel.
      #
      # Next.js output:'export' refuses to build any path that:
      #   (a) uses server-side APIs  (cookies, headers, createServerClient)
      #   (b) has dynamic [param] segments without generateStaticParams()
      #   (c) has  export const dynamic = 'force-dynamic'
      #
      # COMPLETE LIST of paths hidden during this build (verified by audit):
      #   src/app/api/                      — API route handlers (server-only)
      #   src/app/auth/callback/            — server route (uses cookies())
      #   src/app/share/                    — [token] dynamic route
      #   src/app/dashboard/engine-health/  — force-dynamic server component
      #   src/app/messages/[conversationId] — dynamic route, no generateStaticParams
      #
      # ALL paths are restored immediately after the build.
      # None of these are needed inside the APK — they run on Vercel.
      # ─────────────────────────────────────────────────────────────────────
      - name: Build Next.js static export for Capacitor
        run: |
          set -euo pipefail

          echo "=== STEP: Hide server-only and dynamic paths ==="
          echo "  Hiding src/app/api..."
          mv src/app/api /tmp/api_backup

          echo "  Hiding src/app/auth/callback..."
          mv src/app/auth/callback /tmp/auth_callback_backup

          echo "  Hiding src/app/share..."
          mv src/app/share /tmp/share_backup

          echo "  Hiding src/app/dashboard/engine-health..."
          mv src/app/dashboard/engine-health /tmp/engine_health_backup

          echo "  Hiding src/app/messages/[conversationId]..."
          mv "src/app/messages/[conversationId]" /tmp/messages_convo_backup

          echo "=== All paths hidden. Starting next build... ==="

          npm run build
          BUILD_EXIT=$?

          echo "=== Restoring all paths... ==="
          mv /tmp/api_backup src/app/api
          mkdir -p src/app/auth
          mv /tmp/auth_callback_backup src/app/auth/callback
          mv /tmp/share_backup src/app/share
          mv /tmp/engine_health_backup src/app/dashboard/engine-health
          mv /tmp/messages_convo_backup "src/app/messages/[conversationId]"
          echo "=== All paths restored ==="

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "ERROR: Static export failed (exit $BUILD_EXIT)"
            exit $BUILD_EXIT
          fi

          FILE_COUNT=$(find out -type f 2>/dev/null | wc -l)
          echo "Files in out/: $FILE_COUNT"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ERROR: out/ has fewer than 10 files — build may be incomplete"
            exit 1
          fi
          echo "=== Static export complete — $FILE_COUNT files ready for APK ==="
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CAPACITOR_BUILD: '1'
          NEXT_PUBLIC_APP_TYPE: ${{ github.event.inputs.build_type || 'personal' }}

      # ─────────────────────────────────────────────────────────────────────
      # SCAFFOLD ANDROID PROJECT
      # Strategy: backup our custom files, scaffold a fresh Capacitor android
      # project, then restore our files over the scaffold.
      # ─────────────────────────────────────────────────────────────────────
      - name: Scaffold Android project
        run: |
          set -euo pipefail

          echo "=== STEP: Backup custom Android files ==="
          mkdir -p /tmp/qk-backup
          cp -r android/app/src/main/java       /tmp/qk-backup/java
          cp    android/app/src/main/AndroidManifest.xml /tmp/qk-backup/AndroidManifest.xml
          cp    android/app/build.gradle        /tmp/qk-backup/build.gradle
          if [ -d "android/app/src/main/res/mipmap-mdpi" ]; then
            cp -r android/app/src/main/res      /tmp/qk-backup/res
            echo "  Icons + values backed up"
          fi
          echo "  Custom files backed up ✓"

          echo "=== STEP: Remove old android folder ==="
          rm -rf android
          echo "  android/ removed ✓"

          echo "=== STEP: Scaffold fresh Capacitor android project ==="
          npx cap add android
          echo "  Scaffold complete ✓"

          echo "=== STEP: Restore custom files over scaffold ==="
          cp -r /tmp/qk-backup/java             android/app/src/main/
          cp    /tmp/qk-backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp    /tmp/qk-backup/build.gradle     android/app/build.gradle
          mkdir -p android/app/src/main/assets
          if [ -d "/tmp/qk-backup/res" ]; then
            cp -r /tmp/qk-backup/res/.          android/app/src/main/res/
            echo "  Icons + values restored ✓"
          fi
          echo "  Custom files restored ✓"

          echo "=== Final build.gradle dependencies: ==="
          grep -A 25 "^dependencies" android/app/build.gradle

      - name: Apply business config and icons (if business build)
        if: ${{ github.event.inputs.build_type == 'business' }}
        run: |
          set -euo pipefail
          echo "=== STEP: Applying business config ==="
          cp capacitor.business.config.json capacitor.config.json
          sed -i 's/applicationId "com\.pranix\.quietkeep"/applicationId "com.pranix.quietkeep.business"/' android/app/build.gradle
          STRINGS_XML="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_XML" ]; then
            sed -i 's|<string name="app_name">QuietKeep</string>|<string name="app_name">QuietKeep Business</string>|' "$STRINGS_XML"
          fi
          if [ -d "android-res-business" ]; then
            cp -r android-res-business/. android/app/src/main/res/
            echo "  Business icons applied ✓"
          fi
          echo "=== Business config applied ==="

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_PERSONAL: ${{ secrets.GOOGLE_SERVICES_PERSONAL }}
          GOOGLE_SERVICES_BUSINESS: ${{ secrets.GOOGLE_SERVICES_BUSINESS }}
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'personal' }}"
          echo "=== STEP: Write google-services.json (build_type=$BUILD_TYPE) ==="
          if [ "$BUILD_TYPE" = "business" ]; then
            if [ -n "$GOOGLE_SERVICES_BUSINESS" ]; then
              echo "$GOOGLE_SERVICES_BUSINESS" | base64 --decode > android/app/google-services.json
              echo "  Business google-services.json written ✓"
            else
              echo "  WARNING: GOOGLE_SERVICES_BUSINESS secret not set — push notifications disabled"
            fi
          else
            if [ -n "$GOOGLE_SERVICES_PERSONAL" ]; then
              echo "$GOOGLE_SERVICES_PERSONAL" | base64 --decode > android/app/google-services.json
              echo "  Personal google-services.json written ✓"
            else
              echo "  WARNING: GOOGLE_SERVICES_PERSONAL secret not set — push notifications disabled"
            fi
          fi

      - name: Sync Capacitor to Android
        run: |
          echo "=== STEP: cap sync android ==="
          npx cap sync android
          echo "=== cap sync complete ==="

      - name: Verify bundle was synced into APK assets
        run: |
          set -euo pipefail

          echo "=== STEP: Verify asset bundle ==="
          FILE_COUNT=$(find android/app/src/main/assets/public -type f 2>/dev/null | wc -l)
          echo "  Files in android assets: $FILE_COUNT"
          if [ "$FILE_COUNT" -lt 10 ]; then
            echo "ERROR: Capacitor sync did not copy bundle into android assets"
            exit 1
          fi
          echo "  Asset count OK ✓"

          # server.url is intentionally present — APK loads all pages from Vercel.
          # This ensures voice and all API routes work without a fetch-interceptor
          # cold-start race condition. DO NOT remove server.url.
          CONFIG_PATH="android/app/src/main/assets/capacitor.config.json"
          if grep -q '"url"' "$CONFIG_PATH" 2>/dev/null; then
            echo "  INFO: server.url present — APK will load from Vercel (expected) ✓"
          else
            echo "  WARNING: server.url NOT found — APK will use local bundle only (voice may break)"
          fi

          # Verify APP_TYPE routing baked into bundle
          APP_TYPE="${{ github.event.inputs.build_type || 'personal' }}"
          BUNDLE_DIR="android/app/src/main/assets/public/_next/static/chunks/app"
          echo "  Checking APP_TYPE routing for: $APP_TYPE"
          if [ "$APP_TYPE" = "business" ]; then
            if grep -rl "b/dashboard\|biz-login" "$BUNDLE_DIR" 2>/dev/null | head -1 | grep -q .; then
              echo "  VERIFIED: Business routing found in bundle ✓"
            else
              echo "  WARNING: Business routing not found — check NEXT_PUBLIC_APP_TYPE env var"
            fi
          else
            if grep -rl '"/login"\|/dashboard' "$BUNDLE_DIR" 2>/dev/null | head -1 | grep -q .; then
              echo "  VERIFIED: Personal routing found in bundle ✓"
            fi
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode signing keystore (if configured)
        # FIX: Use secrets context directly in if: condition.
        # Step-level env: vars are NOT available in if: expressions —
        # env.SIGNING_KEY_BASE64 always evaluates to '' when defined only at
        # step level. Using secrets.SIGNING_KEY_BASE64 directly is correct.
        if: ${{ secrets.SIGNING_KEY_BASE64 != '' }}
        run: |
          echo "=== STEP: Decode signing keystore ==="
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > android/app/quietkeep-release.keystore
          echo "  Keystore written ✓"

      - name: Build APK (release if signed, debug otherwise)
        working-directory: android
        run: |
          set -euo pipefail
          echo "=== STEP: Gradle build ==="
          echo "  Java: $(java -version 2>&1 | head -1)"
          echo "  Gradle wrapper: $(cat gradle/wrapper/gradle-wrapper.properties | grep distributionUrl)"

          if [ -f "app/quietkeep-release.keystore" ]; then
            echo "  Keystore found — building RELEASE APK"
            ./gradlew assembleRelease --no-daemon --stacktrace \
              -PKEYSTORE_PATH=quietkeep-release.keystore \
              -PKEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
              -PKEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
              -PKEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          else
            echo "  No keystore — building DEBUG APK"
            ./gradlew assembleDebug --no-daemon --stacktrace
          fi
          echo "=== Gradle build complete ==="

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuietKeep-${{ github.event.inputs.build_type || 'personal' }}-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Distribute to Firebase (if configured)
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_PERSONAL }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: beta-testers
          releaseNotes: "Build ${{ github.run_number }} - ${{ github.event.head_commit.message }}"
          file: android/app/build/outputs/apk/release/app-release.apk
        continue-on-error: true

      - name: Show APK details
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"; fi
          if [ -f "$APK_PATH" ]; then
            echo "=== APK built successfully ==="
            echo "  Size: $(du -sh $APK_PATH | cut -f1)"
            BAKED_CONFIG=$(unzip -p "$APK_PATH" assets/capacitor.config.json 2>/dev/null)
            APP_ID=$(echo "$BAKED_CONFIG" | grep -o '"appId":"[^"]*"' | head -1)
            echo "  appId: $APP_ID"
            if echo "$BAKED_CONFIG" | grep -q '"url"'; then
              echo "  PASS: server.url present in APK — Vercel routing active ✓"
            else
              echo "  WARNING: server.url NOT in APK — local bundle only"
            fi
          else
            echo "ERROR: APK not found at expected path"
            exit 1
          fi
